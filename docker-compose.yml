services:
  jekyll:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mi-bachelor-abschlussarbeiten
    ports:
      - "4000:4000"    # Jekyll Server
      - "35729:35729"  # LiveReload
    volumes:
      # Mount Quellcode für Live-Entwicklung
      - .:/app
      # Exclude node_modules und Vendor für Performance
      - /app/node_modules
      - /app/vendor
      - /app/.bundle
    environment:
      - JEKYLL_ENV=development
      - NODE_ENV=development
    command: npm run dev
    tty: true
